<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="3D Oyun Parkı Tasarım Görüntüleyici">
  <title>3D Proje Görüntüleyici</title>
  <link rel="stylesheet" href="css/style.css">

  <!-- model-viewer by Google (Ücretsiz, Açık Kaynak) -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>
<body>

<div class="viewer-page">

  <!-- Loading Screen -->
  <div class="viewer-loading" id="viewerLoading">
    <div class="viewer-loading-orb" id="loadingOrb">🎠</div>
    <div>
      <div class="viewer-loading-title" id="loadingTitle">Model Yükleniyor...</div>
      <div class="viewer-loading-dots">Lütfen bekleyin</div>
    </div>
    <div class="viewer-loading-bar">
      <div class="viewer-loading-bar-fill" id="loadingBarFill"></div>
    </div>
  </div>

  <!-- Error State -->
  <div class="viewer-error" id="viewerError">
    <div class="viewer-error-icon">🔍</div>
    <h2>Proje Bulunamadı</h2>
    <p>Bu link geçersiz veya süre dolmuş olabilir.<br>Proje sahibiyle iletişime geçin.</p>
  </div>

  <!-- model-viewer -->
  <model-viewer
    id="modelViewer"
    camera-controls
    ar
    ar-modes="webxr scene-viewer quick-look"
    shadow-intensity="1"
    shadow-softness="1"
    environment-image="neutral"
    exposure="1"
    interaction-prompt="auto">
  </model-viewer>

  <!-- Header -->
  <header class="viewer-header" id="viewerHeader" style="display:none;">
    <div class="viewer-brand">
      <div class="viewer-brand-badge" id="viewerBrandBadge">🎠</div>
      <div class="viewer-brand-name" id="viewerBrandName">Playground Production</div>
    </div>
    <div class="viewer-badge">
      3D Canlı
    </div>
  </header>

  <!-- Footer -->
  <footer class="viewer-footer" id="viewerFooter" style="display:none;">
    <div class="inner">
      <div class="viewer-project-name" id="viewerProjectName">Proje Adı</div>
      <div class="viewer-client" id="viewerClientName">
        <span>👤</span> <span id="clientNameText">Müşteri</span>
      </div>
      <div class="viewer-desc" id="viewerDesc"></div>
      <div class="viewer-actions">
        <button class="viewer-ar-button" id="arButton" onclick="activateAR()">
          <span>🔭</span> Gerçek Ortamda Gör (AR)
        </button>
        <div class="viewer-hint">
          <span>👆</span> Döndür &nbsp;·&nbsp; <span>🤏</span> Yakınlaştır
        </div>
      </div>
    </div>
  </footer>

</div>

<!-- Toast Container -->
<div id="toast-container"></div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/config.js"></script>
<script src="js/viewer.js"></script>

</body>
</html>
